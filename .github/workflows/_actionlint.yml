# Reusable workflow-lint gate.
#
# Validates every workflow under .github/workflows with actionlint, the schema
# and static checker required by .github/instructions/github-actions.instructions.md.
# A pinned release binary is downloaded from the official repository so the
# checked version is reproducible and not tied to a moving tag.
#
# Callable via `uses: ./.github/workflows/_actionlint.yml` or directly (workflow_dispatch).
name: _actionlint

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ACTIONLINT_VERSION: "1.7.7"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Download the pinned release tarball, verify it extracts a binary, then lint.
      - name: Install actionlint
        run: |
          set -euo pipefail
          url="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          curl --fail --silent --show-error --location "$url" -o actionlint.tar.gz
          tar -xzf actionlint.tar.gz actionlint
          ./actionlint --version

      - name: Run actionlint
        run: ./actionlint -color
