# Module rigor tier classification for every src project.
#
# Schema (derived in
# docs/features/active/2026-05-26-load-aop-sheet-7/evidence/other/
# quality-tiers-schema-derivation.2026-05-26T14-03.md): a top-level `projects`
# mapping from each src module path to exactly one tier in {T1, T2, T3, T4}, per
# .claude/rules/quality-tiers.md. Every project must be classified; an
# unclassified project fails the CI tier-classification stage.
#
# Tier rationale:
#   T2 (Core) — pure-transform ETL core and the AOP loader. Bugs cause feature
#     regressions but not silent data loss; the per-row tie-out validation is the
#     correctness gate, so these modules are Core rather than Critical.
#   T3 (Adapters & UI) — the pandas I/O boundary wraps APIs the team does not own
#     (pandas read_excel/to_sql, openpyxl), which is the T3 adapter role.
#   T4 (Scaffolding) — the empty package marker.

projects:
  # Pure-transform ETL core and loaders (T2-Core).
  src/normalize_le.py: T2
  src/etl_columns.py: T2
  src/etl_key.py: T2
  src/etl_totals.py: T2
  src/load_aop.py: T2
  src/_load_aop_helpers.py: T2
  src/calculator.py: T2

  # Mix-decomp gross-to-net transform pipeline (issue #9) — pure transforms,
  # loaders, and orchestration (T2-Core). Same rationale as the existing ETL
  # modules: bugs cause feature regressions, not silent data loss; per-row and
  # cross-table tie-outs are the correctness gate. The _*_helpers and
  # mix_pipeline_run modules hold split-out logic kept under the 500-line limit.
  src/load_skulu.py: T2
  src/mix_transforms.py: T2
  src/_mix_transforms_helpers.py: T2
  src/mix_lookups.py: T2
  src/mix_rate_impacts.py: T2
  src/mix_rollups.py: T2
  src/_mix_rollups_helpers.py: T2
  src/mix_q1.py: T2
  src/mix_pipeline.py: T2
  src/mix_pipeline_run.py: T2

  # NRR summary builder (issue #15) — pure final summary transform plus its
  # split-out scalar/row helpers, classified T2-Core like the sibling
  # transforms: bugs cause feature regressions, and the internal reconciliation
  # CHECK is the correctness gate.
  src/mix_nrr_summary.py: T2
  src/_mix_nrr_summary_helpers.py: T2

  # BottomsUp mix transforms (issue #18) — pure transforms with the same T2-Core
  # rationale as the other mix modules: bugs cause feature regressions, not silent
  # data loss; per-row and cross-table tie-outs are the correctness gate. The
  # _*_helpers module holds split-out shared arithmetic kept under the line limit.
  src/mix_bottomsup.py: T2
  src/_mix_bottomsup_helpers.py: T2

  # Configurable-schema model and registry (issue #41, epic #40 Feature A) —
  # the typed schema-definition dataclasses, the JSON serialization adapter, the
  # pure registry-directory resolution, and the registry with its injectable
  # file-I/O boundary. Classified T2-Core with the same rationale as the ETL
  # core: these modules define the serializable schema contract later features
  # consume, so bugs cause feature regressions rather than silent data loss, and
  # the __post_init__ structural invariants are the correctness gate. The
  # default real-disk file store lives inside src/schema_registry.py (no separate
  # helper module was needed to stay under the 500-line limit).
  src/schema_model.py: T2
  src/schema_serialization.py: T2
  src/_schema_json_helpers.py: T2
  src/schema_settings.py: T2
  src/schema_registry.py: T2

  # I/O adapter boundary around pandas/openpyxl/SQLite (T3-Adapters).
  src/pandas_io.py: T3

  # Empty package marker / scaffolding (T4).
  src/__init__.py: T4

  # Nuitka build orchestration script (issue #29) — pure build-tooling glue
  # analogous to src/gui/app.py: no transform logic, only argparse + a
  # deterministic argv resolver + a subprocess seam. Classified T4-Scaffolding.
  src/build_exe.py: T4

  # Velopack pack-and-upload orchestration script (issue #31) — pure build-
  # tooling glue sibling of build_exe.py: argparse + deterministic argv
  # resolvers + a subprocess seam, no transform logic. Classified T4.
  src/build_velopack.py: T4

  # PySide6 desktop GUI (issue #19). MVP passive-view structure over the existing
  # pipeline. Tier rationale per .claude/rules/quality-tiers.md:
  #   T2 (Core) — the PipelineService seam, view Protocols, exporter base/registry,
  #     and the plain-Python presenters that hold the presentation logic.
  #   T3 (Adapters & UI) — Qt widgets/dialogs, the workbook/db I/O services, the
  #     concrete exporters, the worker, and the main window shell.
  #   T4 (Scaffolding) — empty package markers and the app composition root.
  src/gui/__init__.py: T4
  src/gui/protocols.py: T2
  src/gui/pipeline_service.py: T2
  src/gui/services/__init__.py: T4
  src/gui/services/workbook_reader.py: T3
  src/gui/services/db_service.py: T3
  src/gui/exporters/__init__.py: T4
  src/gui/exporters/base.py: T2
  src/gui/exporters/registry.py: T2
  src/gui/exporters/excel_exporter.py: T3
  src/gui/exporters/csv_exporter.py: T3
  src/gui/presenters/__init__.py: T4
  src/gui/presenters/source_selection_presenter.py: T2
  src/gui/presenters/pipeline_presenter.py: T2
  src/gui/presenters/export_presenter.py: T2
  src/gui/workers/__init__.py: T4
  src/gui/workers/pipeline_worker.py: T3
  # Runner abstraction (v2 issue #19) — RunnerProtocol seam plus the threaded
  # production runner and synchronous test seam. Classified T2-Core: it owns
  # the dispatch contract used by AC-6 and the presenter callback routing;
  # bugs cause behavioral regressions in Run, not data loss.
  src/gui/runners.py: T2
  src/gui/widgets/__init__.py: T4
  src/gui/widgets/source_input_widget.py: T3
  src/gui/widgets/preview_widget.py: T3
  src/gui/widgets/export_dialog.py: T3
  src/gui/widgets/progress_dialog.py: T3
  src/gui/main_window.py: T3
  src/gui/app.py: T4
  # v2 escape hatch: composition-root chooser/runner defaults extracted from
  # app.py to keep both modules under the 500-line cap. Same T4 scaffolding
  # tier as app.py; both are pure composition glue with no transform logic.
  src/gui/_wiring.py: T4
